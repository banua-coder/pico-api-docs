name: Deploy Documentation to Production

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  deploy:
    uses: banua-coder/banua-coder-workflow/.github/workflows/deploy-on-tag.yml@main
    with:
      deploy-provider: ssh
      node-version: "22"
      build-command: pnpm install && pnpm build
      deploy-path: ${{ vars.DOCS_DEPLOY_PATH }}
      backup-enabled: true
      backup-keep: 3
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'
    steps:
      - name: Verify deployment
        env:
          DOCS_URL: ${{ secrets.DOCS_URL }}
        run: |
          if [ -z "$DOCS_URL" ]; then
            echo "ℹ️ No DOCS_URL configured, skipping health check"
            exit 0
          fi

          echo "🔍 Checking $DOCS_URL..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DOCS_URL")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "⏳ Attempt $i failed (HTTP $STATUS), retrying..."
            sleep 5
          done

          echo "❌ Health check failed after 3 attempts"
          exit 1
