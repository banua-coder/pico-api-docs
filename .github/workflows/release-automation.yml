name: Release Workflow

on:
  pull_request:
    branches: [main]
    types: [closed]
  push:
    branches:
      - "release/**"
      - "hotfix/**"

jobs:
  release:
    uses: banua-coder/banua-coder-workflow/.github/workflows/release.yml@v1
    with:
      project-type: web-app
      main-branch: main
      develop-branch: develop
      pnpm-version: "10.15.1"
    secrets:
      GH_PAT: ${{ secrets.WORKFLOW_TOKEN }}

  trigger-deploy:
    needs: release
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && (startsWith(github.head_ref, 'release/') || startsWith(github.head_ref, 'hotfix/'))
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from branch
        id: version
        run: |
          BRANCH="${{ github.head_ref }}"
          VERSION=$(echo $BRANCH | sed 's/release\///' | sed 's/hotfix\///')
          if [[ ! $VERSION == v* ]]; then VERSION="v$VERSION"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Trigger deploy workflow
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          gh workflow run deploy.yml \
            --repo banua-coder/pico-api-docs \
            --ref main \
            --field tag="${{ steps.version.outputs.version }}"
          echo "✅ Deploy triggered for ${{ steps.version.outputs.version }}"
